{{- if .Values.appwrite.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    {{- range $key, $value := .Values.appwrite.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  name: appwrite-realtime
  labels:
    app: appwrite-realtime
spec:
  ingressClassName: {{ .Values.appwrite.ingress.ingressClassName | quote }}
  rules:
    - host: {{ .Values.appwrite.ingress.realtime.host }}
      http:
        paths:
          - path: /v1/realtime
            pathType: {{ .Values.appwrite.ingress.pathType }}
            backend:
              service:
                name: "appwrite-realtime"
                port:
                  number: {{ .Values.appwrite.server.servicePort }}
{{- end}}
