{{- if .Values.appwrite.enabled }}
apiVersion:  v1
kind:  ConfigMap
metadata:
  name:  mariadb-config
data:
  CNF_FILE: |
    [mariadb]
    max_connections=500
    plugin_load_add=ha_s3
    s3=ON
    s3-bucket=airis-results-backup
    #s3-access-key passed as environment variable
    #s3-secret-key passed as environment variable
    s3-region=us-east-1
    # The following may need to be changed for a MinIO deployment
    s3-host-name=s3.amazonaws.com
    # Set the following variable to 1 if needed for a MinIO deployment
    s3-use-http=0
    #s3-port=9000  # Uncomment as set as needed for a MinIO deployment
{{- end }}
