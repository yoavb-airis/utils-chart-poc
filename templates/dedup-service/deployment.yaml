{{- if .Values.dedupService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dedup-service
  labels:
    app: dedup-service
    {{- include "utils-chart.labels" (dict "labels" .Values.dedupService.labels) | indent 4 }}
spec:
  replicas: {{ .Values.dedupService.replicas | default 1 }}
  selector:
    matchLabels:
      app: dedup-service
  template:
    metadata:
      labels:
        app: dedup-service
    spec:
      serviceAccountName: {{ .Values.global.serviceAccountName | default "default" }}
      containers:
        - name: dedup-service
          resources:
            {{- toYaml .Values.dedupService.resources | nindent 12 }}
          image: "{{ .Values.dedupService.image_name }}:{{ .Values.dedupService.image_tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.dedupService.servicePort }}
          env:
            - name: AIRIS_DEDUP_VECTOR_DB_HOST
              value: general-postgres.{{ .Values.global.namespace }}.{{ .Values.global.cluster_address }}
            - name: AIRIS_DEDUP_VECTOR_DB_PORT
              value: "{{ .Values.generalPostgres.servicePort }}"
            - name: AIRIS_DEDUP_VECTOR_DB_NAME
              value: airis
            - name: AIRIS_DEDUP_VECTOR_DB_USER
              value: {{ .Values.generalPostgres.username }}
            - name: AIRIS_DEDUP_VECTOR_DB_PASSWORD
              value: {{ .Values.generalPostgres.password }}
          livenessProbe:
            exec:
              command:
                - /bin/grpc_health_probe
                - -addr=:{{ .Values.dedupService.servicePort }}
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
