{{- if .Values.generalPostgres.backup.enabled}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: general-postgres-backup
spec:
  replicas: {{ .Values.generalPostgres.backup.replicas }}
  selector:
    matchLabels:
      app: general-postgres-backup
  template:
    metadata:
      labels:
        app: general-postgres-backup
    spec:
      serviceAccountName: {{ .Values.global.serviceAccountName | default "default" }}
      containers:
        - name: general-postgres-backup-airis
          image: "{{ .Values.generalPostgres.backup.image_name }}:{{ .Values.generalPostgres.backup.image_tag }}"
          env:
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: POSTGRES_HOST
              value: general-postgres.{{ .Values.global.namespace }}.{{ .Values.global.cluster_address }}
            - name: POSTGRES_DATABASE
              value: airis
            - name: POSTGRES_USER
              value: {{ .Values.generalPostgres.username }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.generalPostgres.password }}
            - name: SCHEDULE
              value: "@daily"
            - name: S3_REGION
              value: us-east-1
            - name: S3_PREFIX
              value: backup/airis
            - name: S3_ENDPOINT
              value: {{ .Values.generalPostgres.backup.s3_host | default "https://s3.amazonaws.com" }}
            - name: S3_BUCKET
              value: {{ .Values.generalPostgres.backup.s3_bucket | default "airis-results" }}
        - name: general-postgres-backup
          image: "{{ .Values.generalPostgres.backup.image_name }}:{{ .Values.generalPostgres.backup.image_tag }}"
          env:
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: POSTGRES_HOST
              value: general-postgres.{{ .Values.global.namespace }}.{{ .Values.global.cluster_address }}
            - name: POSTGRES_DATABASE
              value: postgres
            - name: POSTGRES_USER
              value: {{ .Values.generalPostgres.username }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.generalPostgres.password }}
            - name: SCHEDULE
              value: "@daily"
            - name: S3_REGION
              value: us-east-1
            - name: S3_PREFIX
              value: backup/postgres
            - name: S3_ENDPOINT
              value: {{ .Values.generalPostgres.backup.s3_host | default "https://s3.amazonaws.com" }}
            - name: S3_BUCKET
              value: {{ .Values.generalPostgres.backup.s3_bucket | default "airis-results" }}
        - name: general-postgres-backup-k8s
          image: "{{ .Values.generalPostgres.backup.image_name }}:{{ .Values.generalPostgres.backup.image_tag }}"
          env:
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: POSTGRES_HOST
              value: general-postgres.{{ .Values.global.namespace }}.{{ .Values.global.cluster_address }}
            - name: POSTGRES_DATABASE
              value: k8s
            - name: POSTGRES_USER
              value: {{ .Values.generalPostgres.username }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.generalPostgres.password }}
            - name: SCHEDULE
              value: "@daily"
            - name: S3_REGION
              value: us-east-1
            - name: S3_PREFIX
              value: backup/k8s
            - name: S3_ENDPOINT
              value: {{ .Values.generalPostgres.backup.s3_host | default "https://s3.amazonaws.com" }}
            - name: S3_BUCKET
              value: {{ .Values.generalPostgres.backup.s3_bucket | default "airis-results" }}
        - name: general-postgres-backup-airis-postoffice
          image: "{{ .Values.generalPostgres.backup.image_name }}:{{ .Values.generalPostgres.backup.image_tag }}"
          env:
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: POSTGRES_HOST
              value: general-postgres.{{ .Values.global.namespace }}.{{ .Values.global.cluster_address }}
            - name: POSTGRES_DATABASE
              value: airis_postoffice
            - name: POSTGRES_USER
              value: {{ .Values.generalPostgres.username }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.generalPostgres.password }}
            - name: SCHEDULE
              value: "@daily"
            - name: S3_REGION
              value: us-east-1
            - name: S3_PREFIX
              value: backup/airis_postoffice
            - name: S3_ENDPOINT
              value: {{ .Values.generalPostgres.backup.s3_host | default "https://s3.amazonaws.com" }}
            - name: S3_BUCKET
              value: {{ .Values.generalPostgres.backup.s3_bucket | default "airis-results" }}

      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
