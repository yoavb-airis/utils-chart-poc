{{- if .Values.generalPostgres.enabled}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: general-postgres-initsql
  namespace: default
data:
  init.sql: |
    CREATE DATABASE dagster;

    CREATE DATABASE airis_postoffice;
    \connect airis_postoffice

    -- DDL file for Post-Office
    -- This file is AUTO-GENERATED! DO NOT EDIT DIRECTLY! Edit model.py instead.
    -- To regenerate: `poetry run python -m post_office.model`
    -- Note: Database creation is handled by the airis-init-db package, not this SQL file

    CREATE TABLE queues (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY,
        name TEXT NOT NULL,
        last_checked TIMESTAMP WITHOUT TIME ZONE DEFAULT now(),
        PRIMARY KEY (id),
        UNIQUE (name)
    );

    CREATE TABLE jobs (
        id BIGINT GENERATED BY DEFAULT AS IDENTITY,
        queue_id INTEGER NOT NULL,
        started BOOLEAN DEFAULT false NOT NULL,
        payload JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT now() NOT NULL,
        priority INTEGER NOT NULL,
        ttl INTEGER NOT NULL,
        PRIMARY KEY (id),
        FOREIGN KEY(queue_id) REFERENCES queues (id)
    );

    CREATE INDEX available_jobs_in_queue_partial_index ON jobs (queue_id) WHERE NOT started;

    CREATE TABLE job_starts (
        id BIGINT GENERATED BY DEFAULT AS IDENTITY,
        job_id BIGINT NOT NULL,
        started_at TIMESTAMP WITH TIME ZONE DEFAULT now() NOT NULL,
        heartbeat TIMESTAMP WITH TIME ZONE DEFAULT now() NOT NULL,
        taken_by TEXT NOT NULL,
        PRIMARY KEY (id),
        UNIQUE (job_id),
        FOREIGN KEY(job_id) REFERENCES jobs (id)
    );

    CREATE TABLE job_completions (
        id BIGINT GENERATED BY DEFAULT AS IDENTITY,
        job_id BIGINT NOT NULL,
        completed_at TIMESTAMP WITH TIME ZONE DEFAULT now() NOT NULL,
        payload JSONB NOT NULL,
        PRIMARY KEY (id),
        UNIQUE (job_id),
        FOREIGN KEY(job_id) REFERENCES jobs (id)
    );


    INSERT INTO queues (name) VALUES ('audio_event_detection'), ('capsules_v1'), ('class_agnostic_object_detection'), ('dedup'), ('diarization'), ('extract_audio'), ('face_db_clustering'), ('face_detection_clustering'), ('face_id_assignment'), ('face_identification'), ('geo_query_triage'), ('geo_preprocess'), ('geolocation'), ('internal_metadata'), ('license_plate_recognition'), ('ner'), ('object_attributes'), ('object_classification'), ('object_detection'), ('object_detection_closed_vocabulary'), ('object_segmentation'), ('object_tracking'), ('object_reclassification'), ('photo_sampling'), ('sentiment'), ('summary'), ('thumbnail'), ('transcribe'), ('transcribe_arabic'), ('transcribe_ivrit'), ('translation_onprem'), ('triage'), ('video_object_instance_clustering'), ('video_sampling'), ('video_sampling_lpr'), ('geo_explainability'), ('find_similar_places');


    CREATE DATABASE airis;
    \connect airis
    CREATE EXTENSION IF NOT EXISTS vector;

    CREATE TABLE videos (
        id INT GENERATED BY DEFAULT AS IDENTITY NOT NULL,
        video_id VARCHAR NOT NULL,
        vector VECTOR(256) NOT NULL,
        PRIMARY KEY (id),
        UNIQUE (video_id)
    );

    CREATE INDEX video_vector_index ON videos USING hnsw (vector vector_cosine_ops) WITH (m = 16, ef_construction = 64);

    CREATE TABLE photos (
        id INT GENERATED BY DEFAULT AS IDENTITY NOT NULL,
        photo_id VARCHAR NOT NULL,
        pdq BIT(256) NOT NULL,
        PRIMARY KEY (id),
        UNIQUE (photo_id)
    );

    -- Create tables for identified
    CREATE TABLE IF NOT EXISTS identified_pois (
        id VARCHAR(32) PRIMARY KEY,
        norm DOUBLE PRECISION NOT NULL,
        embedding vector(512),
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP NOT NULL,
        pid VARCHAR(32) NOT NULL
    );

    ALTER TABLE identified_pois ALTER COLUMN embedding SET STORAGE PLAIN;

    CREATE INDEX idx_created_at ON identified_pois (created_at);
    CREATE INDEX idx_pid ON identified_pois (pid);

    CREATE TABLE IF NOT EXISTS identified_pois_metadata (
        id bigserial PRIMARY KEY,
        identified_pois_id VARCHAR(32) UNIQUE NOT NULL,
        enrollment_image_paths VARCHAR(50),
        source_video VARCHAR(50),
        source_frame INTEGER,
        source_bbox INTEGER ARRAY[4]
    );

    CREATE INDEX idx_identified_pois_id ON identified_pois_metadata (identified_pois_id);

    -- Create tables for unidentified
    CREATE TABLE IF NOT EXISTS unidentified_pois (
        id VARCHAR(32) PRIMARY KEY,
        norm DOUBLE PRECISION NOT NULL,
        embedding vector(512),
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP NOT NULL,
        pid VARCHAR(32) NOT NULL
    );

    ALTER TABLE unidentified_pois ALTER COLUMN embedding SET STORAGE PLAIN;

    CREATE INDEX idx_un_created_at ON unidentified_pois (created_at);
    CREATE INDEX idx_un_pid ON unidentified_pois (pid);

    CREATE TABLE IF NOT EXISTS unidentified_pois_metadata (
        id bigserial PRIMARY KEY,
        unidentified_pois_id VARCHAR(32) UNIQUE NOT NULL,
        enrollment_image_paths VARCHAR(50),
        source_video VARCHAR(50),
        source_frame INTEGER,
        source_bbox INTEGER ARRAY[4]
    );

    CREATE INDEX idx_unidentified_pois_id ON unidentified_pois_metadata (unidentified_pois_id);

    -- Create table to manage the last backfill and when to backfill from
    CREATE TABLE IF NOT EXISTS backfills (
        id VARCHAR(32) PRIMARY KEY,
        latest_record TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP NOT NULL,
        success BOOLEAN NOT NULL DEFAULT FALSE
    );

    CREATE INDEX idx_backfills_created_at_success on backfills (latest_record, success);

    INSERT INTO backfills (id, latest_record, success) SELECT 'EARLIERTHENFIRSTPOIGURANTEED', '1966-12-10 00:00:00', TRUE WHERE NOT EXISTS (SELECT 1 FROM backfills);

    CREATE EXTENSION IF NOT EXISTS vector;

    CREATE TABLE named_entity_clusters (
        id INT GENERATED BY DEFAULT AS IDENTITY NOT NULL,
        entity_name TEXT NOT NULL,
        cluster_name TEXT NOT NULL,
        count BIGINT DEFAULT 1,
        created_at TIMESTAMP DEFAULT NOW(),
        updated_at TIMESTAMP DEFAULT NOW(),
        PRIMARY KEY (id)
    );

    CREATE DATABASE k8s;
    \connect k8s

    CREATE TABLE node_metrics (
        id SERIAL PRIMARY KEY,
        node_name VARCHAR NOT NULL,
        memory_usage_mb FLOAT NOT NULL,
        cpu_usage_cores FLOAT NOT NULL,
        gpu_memory_usage_mb FLOAT NOT NULL,
        timestamp TIMESTAMP NOT NULL
    );

    CREATE TABLE pod_metrics (
        id SERIAL PRIMARY KEY,
        pod_name VARCHAR NOT NULL,
        namespace VARCHAR NOT NULL,
        memory_usage_mb FLOAT NOT NULL,
        cpu_usage_cores FLOAT NOT NULL,
        gpu_memory_usage_mb FLOAT NOT NULL,
        timestamp TIMESTAMP NOT NULL
    );
{{- end }}
