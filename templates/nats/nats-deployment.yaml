{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app: nats
    {{- with .Values.nats.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.nats.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
        {{- with .Values.nats.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.global.serviceAccountName | default "default" }}
      containers:
        - name: nats
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
          image: "{{ .Values.nats.image_name }}:{{ .Values.nats.image_tag }}"
          imagePullPolicy: Always
          args:
            - "-js"
            - "-m"
            - "{{ .Values.nats.monitorPort | default 8222 }}"
          volumeMounts:
            - name: jetstream-data
              mountPath: /data/jetstream
          ports:
            - name: client
              containerPort: {{ .Values.nats.servicePort | default 4222 }}
              protocol: TCP
            - name: monitoring
              containerPort: {{ .Values.nats.monitorPort | default 8222 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.nats.monitorPort | default 8222 }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.nats.monitorPort | default 8222 }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
                {{- if .Values.nats.metrics.enabled }}
        - name: nats-prometheus-exporter
          image: "{{ .Values.nats.prometheusExporter.image_name }}:{{ .Values.nats.prometheusExporter.image_tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - "-varz"
            - "-connz"
            - "-routez"
            - "-subz"
            - "-serverz"
            - "-p=7777"
            - "-a=0.0.0.0"
            - "http://localhost:{{ .Values.nats.monitorPort | default 8222 }}"
          ports:
            - name: metrics
              containerPort: 7777
              protocol: TCP
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        {{- end }}
      volumes:
        - name: jetstream-data
          emptyDir: {}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
